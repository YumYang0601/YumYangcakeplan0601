<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>www.YumYangCakePlan0601.com｜蛋糕大作战</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #1b120b;
      font-family: "Microsoft YaHei", "SimHei", Arial, sans-serif;
      user-select: none;
    }

    #game {
      width: 100vw;
      height: 100vh;
      position: relative;
      background: #1b120b;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .screen {
      width: min(100vw, 177.78vh);
      height: min(56.25vw, 100vh);
      aspect-ratio: 16 / 9;
      position: relative;
      overflow: hidden;
      background: #000;
      box-shadow: 0 0 40px rgba(0,0,0,.45);
    }

    .bg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 1;
      transition: opacity .45s ease;
    }

    .hidden { display: none !important; }

    .hotspot {
      position: absolute;
      border: none;
      background: transparent;
      cursor: pointer;
      padding: 0;
      z-index: 10;
    }
    .hotspot:hover { filter: drop-shadow(0 0 10px #fff3a5); }
    .hotspot:hover::after {
      content: "";
      position: absolute;
      inset: -6px;
      border: 3px dashed rgba(255, 242, 162, .9);
      border-radius: 14px;
      animation: blink .8s infinite alternate;
    }

    @keyframes blink { from { opacity: .25; } to { opacity: 1; } }

    .asset {
      position: absolute;
      z-index: 18;
      object-fit: contain;
      cursor: pointer;
      transition: transform .2s ease, opacity .3s ease;
      filter: drop-shadow(0 8px 6px rgba(0,0,0,.2));
    }
    .asset:hover { transform: scale(1.07); }

    /* 拓宽后的对话框样式，字绝不会飞出去 */
    .dialog {
      position: absolute;
      left: 5%;
      bottom: 6%;
      width: 44%; 
      min-height: 16%;
      z-index: 40;
      background-image: url("images/dialog.png");
      background-size: 100% 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2% 4%;
      color: #2b1609;
      font-size: clamp(14px, 1.55vw, 24px);
      line-height: 1.45;
      text-align: center;
      white-space: pre-line;
      text-shadow: 0 1px #fff6df;
    }

    /* 欢迎居中框 */
    .center-dialog {
      left: 20%;
      bottom: 40%;
      width: 60%;
      min-height: 20%;
      font-size: clamp(16px, 1.75vw, 26px);
      padding: 3% 5%;
    }

    .navBtn {
      position: absolute;
      z-index: 999; 
      border: none;
      cursor: pointer;
      background: transparent;
      padding: 0;
      filter: drop-shadow(0 8px 7px rgba(0,0,0,.25));
      transition: transform .2s ease;
    }
    .navBtn:hover { transform: scale(1.05); }
    .navBtn img { width: 100%; display: block; }

    .startBtn { width: 35%; left: 33%; bottom: 15%; animation: pulse 1.5s infinite; }
    @keyframes pulse {
      0%,100% { transform: scale(1); }
      50% { transform: scale(1.04); }
    }

    .nextBtn { width: 22%; right: 5.5%; bottom: 4.5%; }
    .sendBtn { width: 22%; left: 39%; bottom: 12%; } 

    .sparkle {
      position: absolute;
      z-index: 80;
      pointer-events: none;
      font-size: clamp(18px, 2vw, 32px);
      animation: floatUp 1.2s forwards;
    }
    @keyframes floatUp {
      from { opacity: 1; transform: translateY(0) scale(.5); }
      to { opacity: 0; transform: translateY(-90px) scale(1.5); }
    }

    .cake {
      position: absolute;
      z-index: 22;
      object-fit: contain;
      filter: drop-shadow(0 10px 8px rgba(0,0,0,.25));
      animation: cakeIn .45s ease;
    }
    @keyframes cakeIn {
      from { opacity: 0; transform: translateY(20px) scale(.75); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    @keyframes rotateWhisk {
      0% { transform: translate(0, 0) rotate(0deg); }
      100% { transform: translate(0, 0) rotate(360deg); }
    }
    .mixing {
      animation: rotateWhisk 0.3s infinite linear !important;
    }

    .fadeCover {
      position: absolute;
      inset: 0;
      background: #000;
      z-index: 100;
      pointer-events: none;
      opacity: 0;
      transition: opacity .45s ease;
    }
    .fadeCover.on { opacity: .6; }

    .tip {
      position: absolute;
      left: 50%;
      top: 4%;
      transform: translateX(-50%);
      z-index: 70;
      background: rgba(255, 239, 199, .94);
      border: 4px solid #9d5a2b;
      border-radius: 12px;
      color: #3a1d0d;
      padding: .9% 2%;
      font-weight: 800;
      font-size: clamp(14px, 1.5vw, 25px);
      opacity: 0;
      pointer-events: none;
      transition: opacity .25s, transform .25s;
    }
    .tip.show { opacity: 1; transform: translateX(-50%) translateY(8px); }

    .clickable-note {
      animation: wiggle 1.2s infinite;
    }
    @keyframes wiggle {
      0%,100% { transform: rotate(0deg); }
      25% { transform: rotate(-2deg); }
      75% { transform: rotate(2deg); }
    }

    @media (max-width: 700px) {
      .dialog { font-size: 12px; }
    }
  </style>
</head>
<body>
  <div id="game">
    <div class="screen" id="screen">
      <img id="bg" class="bg" src="images/home.png" alt="game background" />
      <div id="tip" class="tip">提示</div>
      <div id="dialog" class="dialog hidden"></div>
      <div id="layers"></div>
      <div id="buttons"></div>
      <div id="fade" class="fadeCover"></div>
    </div>
  </div>

  <script>
    const A = {
      home: "images/home.png",
      map: "images/map.png",
      strawberry0: "images/strawberry-1.png",
      strawberry1: "images/strawberry-2.png",
      milk0: "images/milk-1.png",
      milk1: "images/milk-2.png",
      flour0: "images/flour-1.png",
      flour1: "images/flour-2.png",
      choco0: "images/choco-1.png",
      choco1: "images/choco-2.png",
      complete: "images/collected.png",
      kitchenBase: "images/kitchen.png",
      finalRoom: "images/final-room.png",
      startBtn: "images/start-button.png",
      btnSend1: "images/btn-send-1.png",
      btnSend2: "images/btn-send-2.png",
      btnSend3: "images/btn-send-3.png",
      btnDone: "images/btn-done.png",
      btnSend: "images/btn-send.png",
      dialogBox: "images/dialog.png",
      gift: "images/gift.png",
      egg: "images/egg.png",
      bowl: "images/bowl.png",
      plate: "images/plate.png",
      strawberryItem: "images/strawberry.png",
      cakeBase: "images/cake-base.png",
      whisk: "images/whisk.png",
      milkItem: "images/milk.png",
      milkBowl: "images/milk-bowl.png",
      flourItem: "images/flour.png",
      chocoItem: "images/chocolate.png",
      creamBag: "images/cream-bag.png",
      creamCake: "images/cake-cream.png",
      cakeChoco: "images/cake-choco.png",
      cakeFinal: "images/cake-final.png",
      cakeHands: "images/cake-hands.png"
    };

    const state = {
      items: { strawberry:false, milk:false, flour:false, choco:false },
      kitchenStep: 0
    };

    const bg = document.getElementById('bg');
    const layers = document.getElementById('layers');
    const buttons = document.getElementById('buttons');
    const dialog = document.getElementById('dialog');
    const fade = document.getElementById('fade');
    const tip = document.getElementById('tip');
    const screen = document.getElementById('screen');

    function clearAll() {
      layers.innerHTML = '';
      buttons.innerHTML = '';
      dialog.className = 'dialog hidden';
      dialog.textContent = '';
    }

    function setBg(src) { bg.src = src; }

    function transition(fn) {
      fade.classList.add('on');
      setTimeout(() => { fn(); fade.classList.remove('on'); sparkleBurst(); }, 260);
    }

    function showTip(text) {
      tip.textContent = text;
      tip.classList.add('show');
      setTimeout(() => tip.classList.remove('show'), 1200);
    }

    function showDialog(text, center=false) {
      dialog.textContent = text;
      dialog.className = center ? 'dialog center-dialog' : 'dialog';
    }

    function addBtn(img, cls, onClick) {
      const b = document.createElement('button');
      b.className = 'navBtn ' + cls;
      b.innerHTML = `<img src="${img}" alt="button">`;
      b.onclick = onClick;
      buttons.appendChild(b);
      return b;
    }

    function addHotspot(style, onClick, label='') {
      const h = document.createElement('button');
      h.className = 'hotspot';
      h.setAttribute('aria-label', label);
      Object.assign(h.style, style);
      h.onclick = onClick;
      layers.appendChild(h);
      return h;
    }

    function addAsset(src, style, onClick, cls='') {
      const img = document.createElement('img');
      img.className = 'asset ' + cls;
      img.src = src;
      Object.assign(img.style, style);
      if (onClick) img.onclick = onClick;
      layers.appendChild(img);
      return img;
    }

    function addCake(src, style) {
      const img = document.createElement('img');
      img.className = 'cake';
      img.src = src;
      Object.assign(img.style, style);
      layers.appendChild(img);
      return img;
    }

    function sparkleBurst() {
      for (let i = 0; i < 16; i++) {
        const s = document.createElement('div');
        s.className = 'sparkle';
        s.textContent = ['✨','💗','⭐','🎀','🍓'][Math.floor(Math.random()*5)];
        s.style.left = Math.random()*100 + '%';
        s.style.top = (20 + Math.random()*55) + '%';
        screen.appendChild(s);
        setTimeout(() => s.remove(), 1300);
      }
    }

    function home() {
      transition(() => {
        clearAll();
        setBg(A.home);
        addBtn(A.startBtn, 'startBtn', map);
      });
    }

    // 地图：有且只有草莓森林可以点击，其他地方不配置热区，点击无响应
    function map() {
      transition(() => {
        clearAll();
        setBg(A.map);
        
        // 唯独可点击的【草莓森林】热区
        addHotspot({left:'30%', top:'20%', width:'19%', height:'22%'}, () => {
          collect('strawberry');
        }, '草莓森林');
      });
    }

    // 直线全自动剧情流：草莓 -> 牛奶 -> 面粉 -> 巧克力 -> 全收集提示 -> 厨房
    function collect(type) {
      const data = {
        strawberry: {
          empty:A.strawberry0, done:A.strawberry1, next:A.btnSend1, nextFn:() => collect('milk'),
          click:{left:'42%', top:'45%', width:'10%', height:'13%'},
          msg:'草莓找到啦！酸酸甜甜，刚好适合今天的快乐。'
        },
        milk: {
          empty:A.milk0, done:A.milk1, next:A.btnSend2, nextFn:() => collect('flour'),
          click:{left:'13%', top:'58%', width:'10%', height:'16%'},
          msg:'牛奶找到啦！今天奶牛们心情特别好～'
        },
        flour: {
          empty:A.flour0, done:A.flour1, next:A.btnSend3, nextFn:() => collect('choco'),
          click:{left:'75%', top:'62%', width:'12%', height:'16%'},
          msg:'面粉找到啦！闻到了吗？是小麦的香气～'
        },
        choco: {
          empty:A.choco0, done:A.choco1, next:A.btnDone, nextFn:() => collectedComplete(),
          click:{left:'13%', top:'60%', width:'14%', height:'20%'},
          msg:'巧克力找到啦！浓郁一点，像偷偷加倍的喜欢。'
        }
      }[type];

      transition(() => {
        clearAll();
        setBg(state.items[type] ? data.done : data.empty);
        addHotspot(data.click, () => {
          if (state.items[type]) return;
          state.items[type] = true;
          setBg(data.done);
          showTip(data.msg);
          sparkleBurst();
          addBtn(data.next, 'nextBtn', data.nextFn);
        }, type);
        if (state.items[type]) addBtn(data.next, 'nextBtn', data.nextFn);
      });
    }

    function collectedComplete() {
      transition(() => {
        clearAll();
        setBg(A.complete);
        addHotspot({left:'0', top:'0', width:'100%', height:'100%'}, kitchenIntro, '开始制作蛋糕');
      });
    }

    function kitchenIntro() {
      state.kitchenStep = 1; 
      renderKitchen();
    }

    let eggAdded = false;
    let milkAdded = false;

    function renderKitchen() {
      clearAll();
      const s = state.kitchenStep;

      // 步骤 1：欢迎框
      if (s === 1) {
        setBg(A.kitchenBase); 
        showDialog(`欢迎来到小羊厨房\n让我们一起做出美味蛋糕吧！！\n\n(点击屏幕任意地方开始制作蛋糕胚)`, true);
        addHotspot({left:'0',top:'0',width:'100%',height:'100%'}, () => {
          state.kitchenStep = 2;
          renderKitchen();
        });
      }
      
      // 步骤 2：全食材上桌，等待点面粉
      else if (s === 2) {
        setBg(A.kitchenBase);
        showDialog('第一步：请点击【面粉】撒在右侧的盘子里。');
        
        addAsset(A.egg, {left:'8%', top:'60%', width:'7%', opacity:'0.5'});
        addAsset(A.milkItem, {left:'18%', top:'56%', width:'7%', opacity:'0.5'});
        addAsset(A.chocoItem, {left:'70%', top:'58%', width:'9%', opacity:'0.5'});
        addAsset(A.strawberryItem, {left:'82%', top:'58%', width:'8%', opacity:'0.5'});
        addAsset(A.bowl, {left:'30%', top:'58%', width:'11%'}); 
        addAsset(A.plate, {left:'52%', top:'60%', width:'13%'}); 

        addAsset(A.flourItem, {left:'60%', top:'54%', width:'8%'}, () => {
          showTip('沙沙沙...面粉平铺完毕！');
          sparkleBurst();
          state.kitchenStep = 3;
          setTimeout(renderKitchen, 1100);
        }, 'clickable-note');
      }

      // 步骤 3：蛋糕胚出现
      else if (s === 3) {
        setBg(A.kitchenBase);
        showDialog('哇！蛋糕胚定型成功！接下来我们制作奶油部分。\n(点击屏幕任意地方继续)');
        
        addAsset(A.egg, {left:'8%', top:'60%', width:'7%'});
        addAsset(A.milkItem, {left:'18%', top:'56%', width:'7%'});
        addAsset(A.chocoItem, {left:'70%', top:'58%', width:'9%', opacity:'0.5'});
        addAsset(A.strawberryItem, {left:'82%', top:'58%', width:'8%', opacity:'0.5'});
        addAsset(A.bowl, {left:'30%', top:'58%', width:'11%'});
        addCake(A.cakeBase, {left:'51%', top:'51%', width:'15%'});

        addHotspot({left:'0',top:'0',width:'100%',height:'100%'}, () => {
          state.kitchenStep = 4;
          renderKitchen();
        });
      }

      // 步骤 4：分别点鸡蛋、牛奶倒碗里
      else if (s === 4) {
        setBg(A.kitchenBase);
        showDialog('第二步：分别点击【鸡蛋】和【牛奶】加入搅拌碗。');
        
        addAsset(A.chocoItem, {left:'70%', top:'58%', width:'9%', opacity:'0.5'});
        addAsset(A.strawberryItem, {left:'82%', top:'58%', width:'8%', opacity:'0.5'});
        addCake(A.cakeBase, {left:'51%', top:'51%', width:'15%'});
        
        if (eggAdded && milkAdded) {
          addAsset(A.milkBowl, {left:'30%', top:'58%', width:'11%'});
        } else {
          addAsset(A.bowl, {left:'30%', top:'58%', width:'11%'});
        }

        if (!eggAdded) {
          addAsset(A.egg, {left:'8%', top:'60%', width:'7%'}, () => {
            eggAdded = true;
            showTip('咔嚓！一个鸡蛋加进去了！');
            checkIngredients();
          }, 'clickable-note');
        }
        if (!milkAdded) {
          addAsset(A.milkItem, {left:'18%', top:'56%', width:'7%'}, () => {
            milkAdded = true;
            showTip('哗啦啦——香甜的牛奶倒进去了！');
            checkIngredients();
          }, 'clickable-note');
        }

        function checkIngredients() {
          renderKitchen();
          if (eggAdded && milkAdded) {
            setTimeout(() => {
              state.kitchenStep = 5;
              renderKitchen();
            }, 1200);
          }
        }
      }

      // 步骤 5：点击搅拌器播放旋转打发动画
      else if (s === 5) {
        setBg(A.kitchenBase);
        showDialog('材料配齐啦！快点击【搅拌器】给奶油快速打发打匀！');
        
        addAsset(A.chocoItem, {left:'70%', top:'58%', width:'9%', opacity:'0.5'});
        addAsset(A.strawberryItem, {left:'82%', top:'58%', width:'8%', opacity:'0.5'});
        addAsset(A.milkBowl, {left:'30%', top:'58%', width:'11%'});
        addCake(A.cakeBase, {left:'51%', top:'51%', width:'15%'});

        const whiskObj = addAsset(A.whisk, {left:'32%', top:'46%', width:'6%', transformOrigin:'center center'}, () => {
          whiskObj.classList.add('mixing'); 
          showTip('正在高速搅拌中...✨');
          setTimeout(() => {
            state.kitchenStep = 6;
            renderKitchen();
          }, 1600);
        }, 'clickable-note');
      }

      // 步骤 6：奶油好啦，点击出现的裱花袋
      else if (s === 6) {
        setBg(A.kitchenBase);
        showDialog('细腻的奶油打好了！点击出现的【奶油裱花袋】给蛋糕胚抹平。');
        
        addAsset(A.chocoItem, {left:'70%', top:'58%', width:'9%', opacity:'0.5'});
        addAsset(A.strawberryItem, {left:'82%', top:'58%', width:'8%', opacity:'0.5'});
        addCake(A.cakeBase, {left:'51%', top:'51%', width:'15%'});

        addAsset(A.creamBag, {left:'31%', top:'48%', width:'9%'}, () => {
          showTip('丝滑的奶油全面覆盖～');
          sparkleBurst();
          state.kitchenStep = 7;
          setTimeout(renderKitchen, 1200);
        }, 'clickable-note');
      }

      // 步骤 7：奶油蛋糕好了，点击巧克力淋酱
      else if (s === 7) {
        setBg(A.kitchenBase);
        showDialog('第三步：点击【巧克力】，让浓郁的巧克力酱淋满整层！');
        
        addAsset(A.strawberryItem, {left:'82%', top:'58%', width:'8%', opacity:'0.5'});
        addCake(A.creamCake, {left:'50%', top:'48%', width:'17%'}); 

        addAsset(A.chocoItem, {left:'70%', top:'58%', width:'9%'}, () => {
          showTip('香浓巧克力倾注而下！❤❤');
          sparkleBurst();
          state.kitchenStep = 8;
          setTimeout(renderKitchen, 1200);
        }, 'clickable-note');
      }

      // 步骤 8：巧克力蛋糕好了，点击草莓点缀
      else if (s === 8) {
        setBg(A.kitchenBase);
        showDialog('最后一步：点击【草莓】，放上新鲜草莓完成梦幻收尾吧！');
        
        addCake(A.cakeChoco, {left:'50%', top:'48%', width:'17%'}); 

        addAsset(A.strawberryItem, {left:'82%', top:'58%', width:'8%'}, () => {
          showTip('完美的草莓放好啦！大功告成！');
          sparkleBurst();
          state.kitchenStep = 9;
          setTimeout(renderKitchen, 1000);
        }, 'clickable-note');
      }

      // 步骤 9：豪华蛋糕大功告成，显示送出按钮
      else if (s === 9) {
        setBg(A.kitchenBase);
        showDialog(`太棒了 豪华生日蛋糕做好了\n我想杨博文一定会超级喜欢的！\n快去送给他吧！◖⚆ᴥ⚆◗`, true);
        addCake(A.cakeFinal, {left:'49%', top:'44%', width:'19%'});
        addBtn(A.btnSend, 'sendBtn', finalPage); 
      }
    }

    // 最终生日房间
    function finalPage() {
      transition(() => {
        clearAll();
        setBg(A.finalRoom); 
        addCake(A.cakeHands, {left:'22%', top:'47%', width:'56%'});
        showTip('生日快乐！');
        setTimeout(sparkleBurst, 500);
      });
    }

    home();
  </script>
</body>
</html>
