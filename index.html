  <style>

    /* 重新微调的大型对话框样式：移到了画面中下部，扩大安全边距，字绝对不会出框 */

      left: 26%;
      top: 38%;

      z-index: 40;
      background-image: url("images/dialog.png");

      display: flex;
      flex-direction: column;

      justify-content: center;
      padding: 1.5% 5%;
      color: #2b1609;
      font-size: clamp(14px, 1.6vw, 24px);

      line-height: 1.45;
      text-align: center;
      white-space: pre-line;
      text-shadow: 0 1px #fff6df;
    }

    /* 统一大小与展示位置 */
    .center-dialog {
      left: 26%;
      top: 38%;
      width: 46%;
      height: 19%;
    }

    .navBtn {
      position: absolute;

    .nextBtn { width: 22%; right: 5.5%; bottom: 4.5%; }

    .sparkle {
      position: absolute;

      pointer-events: none;
      font-size: clamp(18px, 2vw, 32px);
      animation: floatUp 1.2s forwards;
    }
    @keyframes floatUp {
      from { opacity: 1; transform: translateY(0) scale(.5); }
      to { opacity: 0; transform: translateY(-90px) scale(1.5); }
    }

    .cake {
      position: absolute;
      z-index: 22;
      object-fit: contain;
      filter: drop-shadow(0 10px 8px rgba(0,0,0,.25));
      animation: cakeIn .45s ease;
    }
    @keyframes cakeIn {
      from { opacity: 0; transform: translateY(20px) scale(.75); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .fadeCover {
      position: absolute;
      inset: 0;
      background: #000;
      z-index: 100;
      pointer-events: none;
      opacity: 0;
      transition: opacity .45s ease;
    }
    .fadeCover.on { opacity: .6; }

    .tip {
      position: absolute;
      left: 50%;
      top: 4%;
      transform: translateX(-50%);
      z-index: 70;
      background: rgba(255, 239, 199, .94);
      border: 4px solid #9d5a2b;
      border-radius: 12px;
      color: #3a1d0d;
      padding: .9% 2%;
      font-weight: 800;
      font-size: clamp(14px, 1.5vw, 25px);
      opacity: 0;
      pointer-events: none;
      transition: opacity .25s, transform .25s;
    }
    .tip.show { opacity: 1; transform: translateX(-50%) translateY(8px); }

    .clickable-note {
      animation: wiggle 1.2s infinite;
    }
    @keyframes wiggle {
      0%,100% { transform: rotate(0deg); }
      25% { transform: rotate(-2deg); }
      75% { transform: rotate(2deg); }
    }

    @media (max-width: 700px) {
      .dialog { font-size: 12px; }

<body>
  <div id="game">
    <div class="screen" id="screen">
      <img id="bg" class="bg" src="images/home.png" alt="game background" />
      <div id="tip" class="tip">提示</div>
      <div id="dialog" class="dialog hidden"></div>
      <div id="layers"></div>
      <div id="buttons"></div>
      <div id="fade" class="fadeCover"></div>
    </div>
  </div>

  <script>
    const A = {
      home: "images/home.png",
      map: "images/map.png",
      strawberry0: "images/strawberry-1.png",
      strawberry1: "images/strawberry-2.png",
      milk0: "images/milk-1.png",
      milk1: "images/milk-2.png",
      flour0: "images/flour-1.png",
      flour1: "images/flour-2.png",
      choco0: "images/choco-1.png",
      choco1: "images/choco-2.png",
      complete: "images/collected.png",
      kitchenBase: "images/kitchen.png",
      finalRoom: "images/final-room.png",
      startBtn: "images/start-button.png",
      btnSend1: "images/btn-send-1.png",
      btnSend2: "images/btn-send-2.png",
      btnSend3: "images/btn-send-3.png",
      btnDone: "images/btn-done.png",
      btnSend: "images/btn-send.png",
      dialogBox: "images/dialog.png",
      gift: "images/gift.png",
      egg: "images/egg.png",
      bowl: "images/bowl.png",
      plate: "images/plate.png",
      strawberryItem: "images/strawberry.png",
      cakeBase: "images/cake-base.png",
      whisk: "images/whisk.png",
      milkItem: "images/milk.png",
      milkBowl: "images/milk-bowl.png",
      flourItem: "images/flour.png",
      chocoItem: "images/chocolate.png",
      creamBag: "images/cream-bag.png",
      creamCake: "images/cake-cream.png",
      cakeChoco: "images/cake-choco.png",
      cakeFinal: "images/cake-final.png",
      cakeHands: "images/cake-hands.png"
    };

    const state = {
      items: { strawberry:false, milk:false, flour:false, choco:false },
      kitchenStep: 0
    };

    const bg = document.getElementById('bg');
    const layers = document.getElementById('layers');
    const buttons = document.getElementById('buttons');
    const dialog = document.getElementById('dialog');
    const fade = document.getElementById('fade');
    const tip = document.getElementById('tip');
    const screen = document.getElementById('screen');

    function clearAll() {
      layers.innerHTML = '';
      buttons.innerHTML = '';
      dialog.className = 'dialog hidden';
      dialog.textContent = '';
    }

    function setBg(src) { bg.src = src; }

    function transition(fn) {
      fade.classList.add('on');
      setTimeout(() => { fn(); fade.classList.remove('on'); sparkleBurst(); }, 260);
    }

    function showTip(text) {
      tip.textContent = text;
      tip.classList.add('show');
      setTimeout(() => tip.classList.remove('show'), 1200);
    }

    function showDialog(text, center=false) {
      dialog.textContent = text;
      dialog.className = center ? 'dialog center-dialog' : 'dialog';
    }

    function addBtn(img, cls, onClick) {
      const b = document.createElement('button');
      b.className = 'navBtn ' + cls;
      b.innerHTML = `<img src="${img}" alt="button">`;
      b.onclick = onClick;
      buttons.appendChild(b);
      return b;
    }

    function addHotspot(style, onClick, label='') {
      const h = document.createElement('button');
      h.className = 'hotspot';
      h.setAttribute('aria-label', label);
      Object.assign(h.style, style);
      h.onclick = onClick;
      layers.appendChild(h);
      return h;
    }

    function addAsset(src, style, onClick, cls='') {
      const img = document.createElement('img');
      img.className = 'asset ' + cls;
      img.src = src;
      Object.assign(img.style, style);
      if (onClick) img.onclick = onClick;
      layers.appendChild(img);
      return img;
    }

    function addCake(src, style) {
      const img = document.createElement('img');
      img.className = 'cake';
      img.src = src;
      Object.assign(img.style, style);
      layers.appendChild(img);
      return img;
    }

    function sparkleBurst() {
      for (let i = 0; i < 16; i++) {
        const s = document.createElement('div');
        s.className = 'sparkle';
        s.textContent = ['✨','💗','⭐','🎀','🍓'][Math.floor(Math.random()*5)];
        s.style.left = Math.random()*100 + '%';
        s.style.top = (20 + Math.random()*55) + '%';
        screen.appendChild(s);
        setTimeout(() => s.remove(), 1300);
      }
    }

    function home() {
      transition(() => {
        clearAll();
        setBg(A.home);
        addBtn(A.startBtn, 'startBtn', map);
      });
    }

    function map() {
      transition(() => {
        clearAll();
        setBg(A.map);
        
        const hb = addHotspot({left:'30%', top:'20%', width:'19%', height:'22%'}, () => collect('strawberry'), '草莓森林');
        hb.classList.add('active');

        addHotspot({left:'64%', top:'18%', width:'20%', height:'24%'}, () => showTip('请先前往草莓森林冒险哦！'), '牛奶牧场');
        addHotspot({left:'12%', top:'57%', width:'20%', height:'23%'}, () => showTip('请先前往草莓森林冒险哦！'), '面粉小镇');
        addHotspot({left:'35%', top:'55%', width:'21%', height:'25%'}, () => showTip('请先前往草莓森林冒险哦！'), '巧克力山洞');
        addHotspot({left:'58%', top:'54%', width:'22%', height:'22%'}, () => showTip('还没收集完草莓呢～'), '制作蛋糕');
        addHotspot({left:'77%', top:'71%', width:'18%', height:'18%'}, () => showTip('先把食材都找齐吧！'), '送给杨博文');
      });
    }

    function collect(type) {
      const data = {
        strawberry: {
          empty:A.strawberry0, done:A.strawberry1, next:A.btnSend1, nextFn:() => collect('milk'),
          click:{left:'42%', top:'45%', width:'10%', height:'13%'},
          msg:'草莓找到啦！酸酸甜甜，刚好适合今天的快乐。',
          repeat:'草莓已经装进背包啦～'
        },
        milk: {
          empty:A.milk0, done:A.milk1, next:A.btnSend2, nextFn:() => collect('flour'),
          click:{left:'13%', top:'58%', width:'10%', height:'16%'},
          msg:'牛奶找到啦！今天奶牛们心情特别好～',
          repeat:'牛奶已经放好啦～'
        },
        flour: {
          empty:A.flour0, done:A.flour1, next:A.btnSend3, nextFn:() => collect('choco'),
          click:{left:'75%', top:'62%', width:'12%', height:'16%'},
          msg:'面粉找到啦！闻到了吗？是小麦的香气～',
          repeat:'面粉已经收好啦～'
        },
        choco: {
          empty:A.choco0, done:A.choco1, next:A.btnDone, nextFn:collectedComplete,
          click:{left:'13%', top:'60%', width:'14%', height:'20%'},
          msg:'巧克力找到啦！浓郁一点，像偷偷加倍的喜欢。',
          repeat:'巧克力已经收集完成！'
        }
      }[type];

      transition(() => {
        clearAll();
        setBg(state.items[type] ? data.done : data.empty);
        addHotspot(data.click, () => {
          if (state.items[type]) { showTip(data.repeat); return; }
          state.items[type] = true;
          setBg(data.done);
          showTip(data.msg);
          sparkleBurst();
          addBtn(data.next, 'nextBtn', data.nextFn);
        }, type);
        if (state.items[type]) addBtn(data.next, 'nextBtn', data.nextFn);
      });
    }

    function collectedComplete() {
      transition(() => {
        clearAll();
        setBg(A.complete);
        addHotspot({left:'0', top:'0', width:'100%', height:'100%'}, kitchenIntro, '开始制作蛋糕');
      });
    }

    function kitchenIntro() {
      state.kitchenStep = 0;
      transition(() => {
        clearAll();
        setBg(A.kitchenBase);
        showDialog(`欢迎来到小羊厨房\n让我们一起做出美味蛋糕吧！！\n\n(点击屏幕任意地方开始制作蛋糕胚)`);
        addHotspot({left:'0',top:'0',width:'100%',height:'100%'}, kitchenNext, '继续');
      });
    }

    function kitchenNext() {
      state.kitchenStep++;
      renderKitchen();
    }

    // 基于图二横向格纹布完美计算的对齐定位系统
    function renderKitchen() {
      clearAll();
      setBg(A.kitchenBase);
      const s = state.kitchenStep;

      // 严格参照图二垫子上的水平腰线高度
      const itemTop = '63%'; 

      if (s === 1) {
        showDialog(`第一步\n先用面粉做出蛋糕胚吧`);
        // 精准横向线性平铺 7 个初始素材，实现图二的规整布局
        addAsset(A.egg, {left:'8%', top:itemTop, width:'8%'});
        addAsset(A.milkItem, {left:'18%', top:itemTop, width:'6%'});
        addAsset(A.bowl, {left:'26%', top:itemTop, width:'10%'});
        addAsset(A.plate, {left:'38%', top:itemTop, width:'11%'});
        addAsset(A.flourItem, {left:'51%', top:itemTop, width:'8%'});
        addAsset(A.strawberryItem, {left:'61%', top:itemTop, width:'9%'});
        addAsset(A.chocoItem, {left:'72%', top:itemTop, width:'8%'});

        addHotspot({left:'0',top:'0',width:'100%',height:'100%'}, kitchenNext);
      }
      else if (s === 2) {
        showDialog('点击面粉');
        addAsset(A.egg, {left:'8%', top:itemTop, width:'8%'});
        addAsset(A.milkItem, {left:'18%', top:itemTop, width:'6%'});
        addAsset(A.bowl, {left:'26%', top:itemTop, width:'10%'});
        addAsset(A.plate, {left:'38%', top:itemTop, width:'11%'});
        addAsset(A.flourItem, {left:'51%', top:itemTop, width:'8%'}, () => kitchenNext(), 'clickable-note');
        addAsset(A.strawberryItem, {left:'61%', top:itemTop, width:'9%'});
        addAsset(A.chocoItem, {left:'72%', top:itemTop, width:'8%'});
      }
      else if (s === 3) {
        showDialog('制作中...');
        addAsset(A.egg, {left:'8%', top:itemTop, width:'8%'});
        addAsset(A.milkItem, {left:'18%', top:itemTop, width:'6%'});
        addAsset(A.bowl, {left:'26%', top:itemTop, width:'10%'});
        addAsset(A.plate, {left:'38%', top:itemTop, width:'11%'});
        addAsset(A.flourItem, {left:'51%', top:itemTop, width:'8%', opacity:'0.3'}); // 面粉消耗褪色
        addAsset(A.strawberryItem, {left:'61%', top:itemTop, width:'9%'});
        addAsset(A.chocoItem, {left:'72%', top:itemTop, width:'8%'});
        setTimeout(kitchenNext, 1200);
      }
      else if (s === 4) {
        showDialog(`非常好！蛋糕胚已经制作完成了\n下一步用鸡蛋和牛奶做出奶油吧`);
        addAsset(A.egg, {left:'8%', top:itemTop, width:'8%'});
        addAsset(A.milkItem, {left:'18%', top:itemTop, width:'6%'});
        addAsset(A.bowl, {left:'26%', top:itemTop, width:'10%'});
        addCake(A.cakeBase, {left:'36%', top:'55%', width:'15%'}); // 完美的蛋糕胚生成在盘子上
        addAsset(A.strawberryItem, {left:'61%', top:itemTop, width:'9%'});
        addAsset(A.chocoItem, {left:'72%', top:itemTop, width:'8%'});

        addHotspot({left:'0',top:'0',width:'100%',height:'100%'}, kitchenNext);
      }
      else if (s === 5) {
        showDialog('点击搅拌碗开始制作奶油～\n╰(〃>ᗜ<〃)╯');
        addAsset(A.egg, {left:'8%', top:itemTop, width:'8%'});
        addAsset(A.milkItem, {left:'18%', top:itemTop, width:'6%'});
        addAsset(A.bowl, {left:'26%', top:itemTop, width:'10%'}, () => kitchenNext(), 'clickable-note');
        addCake(A.cakeBase, {left:'36%', top:'55%', width:'15%'});
        addAsset(A.strawberryItem, {left:'61%', top:itemTop, width:'9%'});
        addAsset(A.chocoItem, {left:'72%', top:itemTop, width:'8%'});
      }
      else if (s === 6) {
        showDialog(`嗯嗯！！\n再加点巧克力酱怎么样呢`);
        addAsset(A.milkBowl, {left:'25%', top:'59%', width:'11%'}); // 变成搅拌好的状态
        addCake(A.cakeChoco, {left:'35%', top:'52%', width:'17%'}); // 进化成巧克力胚
        addAsset(A.strawberryItem, {left:'61%', top:itemTop, width:'9%'});
        addAsset(A.chocoItem, {left:'72%', top:itemTop, width:'8%'}, () => kitchenNext(), 'clickable-note');
      }
      else if (s === 7) {
        showDialog('β(＾･ω･＾)✧');
        addAsset(A.milkBowl, {left:'25%', top:'59%', width:'11%', opacity:'0.4'});
        addCake(A.cakeChoco, {left:'35%', top:'52%', width:'17%'});
        addAsset(A.strawberryItem, {left:'61%', top:itemTop, width:'9%'});
        addHotspot({left:'0',top:'0',width:'100%',height:'100%'}, kitchenNext);
      }
      else if (s === 8) {
        showDialog(`有草莓点缀会更好看哟\n／ʚ・ω・ɞ／`);
        addCake(A.cakeChoco, {left:'35%', top:'52%', width:'17%'});
        addAsset(A.strawberryItem, {left:'61%', top:itemTop, width:'9%'}, () => kitchenNext(), 'clickable-note');
      }
      else if (s === 9) {
        showDialog('+♡(︶︶)✟');
        addCake(A.cakeFinal, {left:'34%', top:'49%', width:'19%'}); // 最终大蛋糕落盘
        addHotspot({left:'0',top:'0',width:'100%',height:'100%'}, kitchenNext);
      }
      else if (s === 10) {
        showDialog(`太棒了 蛋糕做好了\n我想杨博文一定会喜欢的！\n快去送给他吧！◖⚆ᴥ⚆◗`);
        addCake(A.cakeFinal, {left:'34%', top:'49%', width:'19%'});
        addBtn(A.btnSend, 'sendBtn', finalPage);
      }
    }

    function finalPage() {
      transition(() => {
        clearAll();
        setBg(A.finalRoom);
        addCake(A.cakeHands, {left:'22%', top:'47%', width:'56%'});
        showTip('生日快乐！');
        setTimeout(sparkleBurst, 500);
      });
    }

    home();
  </script>
</body>
</html>
